---
# Install Docker from the official Docker apt repo (newer than Ubuntu's own),
# and mount the persistent data volume if one was provisioned.

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker's GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add the Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Install Docker Engine and the Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add users to the docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

- name: Ensure the data mount point exists
  ansible.builtin.file:
    path: "{{ docker_data_path }}"
    state: directory
    mode: "0755"
  when: docker_data_volume_id is not none

- name: Mount the Hetzner data volume
  ansible.posix.mount:
    path: "{{ docker_data_path }}"
    src: "/dev/disk/by-id/scsi-0HC_Volume_{{ docker_data_volume_id }}"
    fstype: ext4
    opts: discard,defaults
    state: mounted
  when: docker_data_volume_id is not none

- name: Allow HTTP and HTTPS through the firewall
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"
